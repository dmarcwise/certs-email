name: Deploy
run-name: Deploy to ${{ inputs.deploy_target }} (${{ github.sha }})

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: true
        default: 'PROD'
        type: choice
        options:
          - PROD

jobs:
  PROD-build-and-push:
    name: '[PROD] Build and push'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: inputs.deploy_target == 'PROD'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          push: true
          tags: 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
  PROD-deploy:
    name: '[PROD] Deploy'
    runs-on: ubuntu-latest
    if: inputs.deploy_target == 'PROD'
    needs: PROD-build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Prepare deploy
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/key
          echo "${{ secrets.SSH_CONFIG }}" > ~/.ssh/config
          chmod 600 ~/.ssh/*
      - name: Deploy
        env:
          SERVER: dmw-prod-1
          COMPOSE_SOURCE_PATH: docker-compose.yml
          COMPOSE_DESTINATION_PATH: /tmp/certs-email.yml
        run: |
          set -euo pipefail
          scp -i ~/.ssh/key $COMPOSE_SOURCE_PATH $SERVER:$COMPOSE_DESTINATION_PATH
          ssh $SERVER \
            -i ~/.ssh/key \
            COMPOSE_FILE_PATH=$COMPOSE_DESTINATION_PATH \
            OP_CONNECT_TOKEN=${{ secrets.OP_CONNECT_TOKEN }} \
            DOCKER_REGISTRY_NAME=ghcr.io \
            DOCKER_REGISTRY_USERNAME=${{ github.actor }} \
            DOCKER_REGISTRY_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            DOCKER_IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }} \
            'bash -s' < .github/workflows/deploy.sh
